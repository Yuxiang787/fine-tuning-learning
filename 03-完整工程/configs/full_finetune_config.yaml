# 全量微调配置文件
# 适用于小模型的完整参数微调

# 模型配置 - M4 24GB 建议全量微调 0.5B
model_name: "Qwen/Qwen2.5-0.5B"

# 数据配置
data: "data.jsonl"
validation_data: null
max_length: 512

# 微调模式
use_lora: false
full_finetune: true

# 训练配置
# 全量微调需要更小的学习率和 batch size
output_dir: "./output/full_qwen0.5b"
num_epochs: 3
batch_size: 1
learning_rate: 1e-5
warmup_steps: 10
gradient_accumulation_steps: 8
weight_decay: 0.01
max_grad_norm: 1.0

# 日志与保存
logging_steps: 10
save_strategy: "epoch"
report_to: "tensorboard"
run_name: "full-qwen0.5b-m4"

# 性能配置
fp16: true
bf16: false
dataloader_workers: 0

# 其他
seed: 42
